services:
  postgres:
    image: postgres:16-alpine
    container_name: gscores-postgres
    environment:
      POSTGRES_DB: gscores
      POSTGRES_USER: gscores
      POSTGRES_PASSWORD: gscores
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gscores -d gscores"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gscores-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gscores-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gscores?reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: gscores
      SPRING_DATASOURCE_PASSWORD: gscores
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_SEEDER_ENABLED: ${APP_SEEDER_ENABLED:-false}
      APP_SEEDER_CSV_PATH: /dataset/diem_thi_thpt_2024.csv
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    volumes:
      - ./dataset:/dataset:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: gscores-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
