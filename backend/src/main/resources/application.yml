spring:
  application:
    name: gscores

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gscores?reWriteBatchedInserts=true}
    username: ${SPRING_DATASOURCE_USERNAME:gscores}
    password: ${SPRING_DATASOURCE_PASSWORD:gscores}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}

server:
  port: 8080

logging:
  level:
    com.goldenowl.gscores: DEBUG

app:
  seeder:
    enabled: false
    csv-path: ../dataset/diem_thi_thpt_2024.csv
    file-name: diem_thi_thpt_2024.csv
    batch-size: 2000
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
