databases:
  - name: gscores-db
    databaseName: gscores
    user: gscores
    plan: free

services:
  - type: redis
    name: gscores-redis
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: gscores-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PGHOST
        fromDatabase:
          name: gscores-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: gscores-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: gscores-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: gscores-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: gscores-db
          property: password
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: gscores-redis
          type: redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: gscores-redis
          type: redis
          property: port
      - key: SPRING_DATA_REDIS_PASSWORD
        fromService:
          name: gscores-redis
          type: redis
          property: password
      - key: APP_SEEDER_ENABLED
        value: "true"
      - key: APP_SEEDER_CSV_PATH
        value: "classpath:dataset/diem_thi_thpt_2024_demo.csv"
      - key: APP_SEEDER_FILE_NAME
        value: "diem_thi_thpt_2024_demo.csv"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false  # Set = URL Vercel frontend của bạn, vd: https://gscores.vercel.app
